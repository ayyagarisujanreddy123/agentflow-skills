name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  skills:
    name: Skills structure tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Skills and agents are plain markdown — no install, no build.
      - name: Validate skills + worker structure
        run: node test/skills.mjs

      - name: Installer tests (copies into a temp dir)
        run: node test/installer.mjs

  legacy-mcp:
    name: Legacy MCP build and test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legacy/mcp
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: legacy/mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: node test/unit.mjs

      - name: Smoke tests (MCP stdio handshake, no real API calls)
        run: node test/smoke.mjs
        env:
          ANTHROPIC_API_KEY: sk-ant-fake-key-for-smoke-tests

      - name: Verify package contents
        run: npm pack --dry-run
