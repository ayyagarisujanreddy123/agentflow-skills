name: Claude review

# Auto-reviews every PR to main with the agentflow-review methodology
# (the repo's own SEVERITY/LINE/ISSUE/FIX format — this workflow dogfoods the skill).
# The job always completes green: it posts findings, it does not block on them.
# The merge gate is branch protection (CI green + 1 human approval); a human
# reads these findings before approving. Requires the ANTHROPIC_API_KEY repo secret.

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    name: Claude review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a senior code reviewer for the AgentFlow repository. Review the
            diff of this pull request (use `gh pr diff ${{ github.event.pull_request.number }}`)
            for real defects: logic errors, off-by-one bugs, unhandled edge cases,
            resource leaks, race conditions, injection/auth flaws, secrets in code,
            and input-validation gaps. Skip style nits unless they hide a real bug.

            For every issue, post an inline comment in this exact format, one finding
            per comment, no preamble and no summary:
              SEVERITY: [CRITICAL|HIGH|MEDIUM|LOW]
              ISSUE: <one sentence describing the problem>
              FIX: <one sentence describing the fix>

            Rules:
            - Cite the exact file and line via the inline-comment tool. If unsure of a
              line, do not report it.
            - Do not invent issues to look thorough. Be precise and terse.
            - If you find no defects, post a single top-level comment: NO_ISSUES_FOUND
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
