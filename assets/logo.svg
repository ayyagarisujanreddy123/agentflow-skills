<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#7c5cff"/>
      <stop offset="50%" stop-color="#3ab0ff"/>
      <stop offset="100%" stop-color="#00d4a8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mark: stacked flow arrows representing tool routing from primary → haiku/sonnet -->
  <g transform="translate(20,30)" filter="url(#glow)">
    <!-- top node (primary) -->
    <circle cx="20" cy="20" r="10" fill="none" stroke="url(#g)" stroke-width="3"/>
    <!-- middle bus -->
    <rect x="6" y="40" width="28" height="6" rx="3" fill="url(#g)"/>
    <!-- bottom nodes (tools) -->
    <circle cx="8"  cy="64" r="5" fill="url(#g)"/>
    <circle cx="20" cy="64" r="5" fill="url(#g)"/>
    <circle cx="32" cy="64" r="5" fill="url(#g)"/>
    <!-- arrow returning result -->
    <path d="M44 50 L60 50 L54 44 M60 50 L54 56" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="115" y="80"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="48" font-weight="700"
        fill="url(#g)">
    AgentFlow
  </text>

  <!-- Tagline -->
  <text x="116" y="108"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', monospace"
        font-size="13" font-weight="500"
        fill="#8b94a7" letter-spacing="0.5">
    smart tools • cheap routes • clean context
  </text>
</svg>
